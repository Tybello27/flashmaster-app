<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />
    <meta name="theme-color" content="#0284c7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0284c7" />
    <meta name="description" content="FlashMaster — Learn smarter, not harder. Premium flashcards, quizzes, streaks and achievements." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FlashMaster" />
    <meta name="application-name" content="FlashMaster" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <title>FlashMaster — Learn Smarter, Not Harder</title>
    <style>
      html, body, #root { height: 100%; }
      body {
        margin: 0;
        background: #f3f4f6;
        color: #111827;
        overscroll-behavior-y: none;
        -webkit-tap-highlight-color: transparent;
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; color: #f9fafb; }
      }
      #boot { position: fixed; inset: 0; display: grid; place-items: center; }
      #boot .logo {
        width: 72px; height: 72px; border-radius: 20px;
        background: #0284c7;
        color: white;
        display: grid; place-items: center; font-size: 36px;
        box-shadow: 0 10px 30px rgba(2,132,199,.3);
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
        <div class="logo">⚡</div>
        <div style="font-weight:800;letter-spacing:.02em;font-size:14px;opacity:.7">FLASHMASTER</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
